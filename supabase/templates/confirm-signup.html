<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap">
</head>
<body style="margin:0;padding:0;background-color:#F5F2EB;font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F5F2EB;padding:40px 0;">
    <tr><td align="center">
      <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;">
        <tr><td style="padding:40px 32px;text-align:center;">

          <!-- Logo -->
          <table cellpadding="0" cellspacing="0" style="margin:0 auto 24px;">
            <tr>
              <td style="width:36px;height:36px;background:#C05A3C;border-radius:8px;text-align:center;vertical-align:middle;color:#ffffff;font-size:16px;font-weight:700;line-height:36px;font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;">A</td>
              <td style="padding-left:8px;font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;color:#1a1a1a;vertical-align:middle;">AURAL</td>
            </tr>
          </table>

          <!-- Heading -->
          <h2 style="margin:0 0 8px;font-size:20px;font-weight:700;color:#1a1a1a;font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">Verify your email</h2>
          <p style="margin:0 0 28px;font-size:14px;color:#555555;line-height:1.5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">Enter this code in Aural to complete your registration:</p>

          <!-- Code -->
          <table cellpadding="0" cellspacing="0" style="margin:0 auto 28px;">
            <tr><td style="background:#C05A3C;border-radius:8px;padding:14px 28px;">
              <span style="font-size:28px;font-weight:700;letter-spacing:6px;color:#ffffff;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;">{{ .Token }}</span>
            </td></tr>
          </table>

          <!-- Disclaimer -->
          <p style="margin:0;font-size:13px;color:#888888;line-height:1.5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">If you didn't create an Aural account, you can safely ignore this email.</p>

        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
